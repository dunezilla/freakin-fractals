<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Zen Garden</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050508;
            /* Deep dark background */
            font-family: sans-serif;
        }

        canvas {
            display: block;
        }

        #instructions {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            pointer-events: none;
            user-select: none;
            z-index: 10;
        }

        h1 {
            font-weight: 300;
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        p {
            font-size: 0.9rem;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div id="instructions">
        <h1>DIGITAL FLOW FIELD</h1>
        <p>Move your mouse to disturb the flow.<br>Click to reset the center.</p>
    </div>

    <!-- Import Three.js from a CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Configuration ---
        const CONFIG = {
            particleCount: 8000,      // Number of particles (lower on mobile)
            flowSpeed: 0.15,          // Speed of organic movement
            mouseInfluenceRadius: 300,// Radius around mouse where things react
            reactionStrength: 2       // How hard they bend towards mouse
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050508, 0.02); // Mist effect

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 50);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimize for high DPI
        document.body.appendChild(renderer.domElement);

        // --- Particles ---
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(CONFIG.particleCount * 3);
        const colors = new Float32Array(CONFIG.particleCount * 3);

        // Store original positions for the "flow" logic
        const initialPositions = new Float32Array(CONFIG.particleCount * 3);

        const color1 = new THREE.Color(0x4f8ef7); // Soft Blue
        const color2 = new THREE.Color(0xc64c9e); // Magenta/Purple
        const color3 = new THREE.Color(0xffffff); // White highlight

        for (let i = 0; i < CONFIG.particleCount; i++) {
            // Random positions in a wide area
            const i3 = i * 3;

            // Spread particles out in a spherical-ish cloud
            const angleX = Math.random() * Math.PI * 2;
            const angleY = Math.acos(2 * Math.random() - 1);
            const radius = 50 + Math.random() * 60;

            positions[i3] = radius * Math.sin(angleY) * Math.cos(angleX);
            positions[i3 + 1] = (Math.random() - 0.5) * 20; // Height variation
            positions[i3 + 2] = radius * Math.sin(angleY) * Math.sin(angleX);

            initialPositions[i3] = positions[i3];
            initialPositions[i3 + 1] = positions[i3 + 1];
            initialPositions[i3 + 2] = positions[i3 + 2];

            // Assign colors (mostly blue, some purple/white)
            if (Math.random() > 0.95) {
                colors[i3] = color3.r;
                colors[i3 + 1] = color3.g;
                colors[i3 + 2] = color3.b;
            } else if (Math.random() > 0.85) {
                colors[i3] = color2.r;
                colors[i3 + 1] = color2.g;
                colors[i3 + 2] = color2.b;
            } else {
                colors[i3] = color1.r;
                colors[i3 + 1] = color1.g;
                colors[i3 + 2] = color1.b;
            }
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // Create a soft, glowing particle material
        const material = new THREE.PointsMaterial({
            size: 0.8,
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending, // Makes colors light up when overlapping
            depthWrite: false,
            map: createGlowingTexture()
        });

        // Helper function to create a circular glow texture
        function createGlowingTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(0.5, 'rgba(255,255,255,0.2)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 64, 64);
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // --- Mouse Interaction Logic ---
        let mouseX = 0;
        let mouseY = 0;
        let targetMouseX = 0;
        let targetMouseY = 0;

        document.addEventListener('mousemove', (event) => {
            // Map mouse position from screen to world space (rough approximation for the camera setup)
            targetMouseX = (event.clientX - window.innerWidth / 2) * 0.1;
            targetMouseY = -(event.clientY - window.innerHeight / 2) * 0.1;
        });

        // Click to reset interactivity
        document.addEventListener('mousedown', () => {
            targetMouseX = 0;
            targetMouseY = 0;
            mouseX = 0;
            mouseY = 0;
        });

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Adjust particle size based on screen width for mobile vs desktop
            material.size = window.innerWidth < 768 ? 0.4 : 0.8;
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        // Smooth interpolation variable
        let time = 0;

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            time += delta * 0.5;

            // Update smooth mouse movement (lerp)
            mouseX += (targetMouseX - mouseX) * 0.1;
            mouseY += (targetMouseY - mouseY) * 0.1;

            const positions = particles.geometry.attributes.position.array;

            // Iterate through every particle position
            for (let i = 0; i < CONFIG.particleCount; i++) {
                const i3 = i * 3;

                const x = initialPositions[i3];
                const y = initialPositions[i3 + 1];
                const z = initialPositions[i3 + 2];

                // 1. THE FLOW: Add a gentle sine wave based on time to simulate fluid movement
                positions[i3] = x + Math.sin(x * 0.5 + time) * 0.2;
                positions[i3 + 1] = y + Math.cos(z * 0.5 + time) * 0.2;
                positions[i3 + 2] = z + Math.sin(y * 0.5 + time) * 0.2;

                // 2. THE MOUSE INTERACTION: Calculate distance to mouse (projected on XZ plane roughly)
                // We project the mouse world position to roughly match our scene scale
                const mouseDistX = (x - mouseX) * 1.5;
                const mouseDistY = z - mouseY * 0.8; // Y is inverted in our math relative to screen

                const dist = Math.sqrt(mouseDistX * mouseDistX + mouseDistY * mouseDistY);

                // If mouse is close, push particles away or attract them based on config
                if (dist < CONFIG.mouseInfluenceRadius) {
                    // Calculate direction vector from particle to mouse
                    const dx = mouseX - x;
                    const dy = mouseY - z;

                    // Normalize and scale force
                    const force = CONFIG.reactionStrength * (1 - dist / CONFIG.mouseInfluenceRadius);

                    // Gently pull particles towards the mouse cursor in 3D space
                    positions[i3] += dx * force * 0.02;
                    positions[i3 + 2] += dy * force * 0.02;
                }
            }

            geometry.attributes.position.needsUpdate = true; // Crucial for Three.js to render changes
            renderer.render(scene, camera);
        }

        animate();

    </script>
</body>

</html>
