<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON FRACTAL NEBULA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #4fc3f7;
            --secondary: #6c5ce7;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #020205;
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }

        canvas {
            display: block;
            outline: none;
        }

        .ui-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            z-index: 100;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        header {
            max-width: fit-content;
        }

        h1 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.4rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .tagline {
            font-size: 2.5rem;
            font-weight: 300;
            line-height: 1.1;
        }

        footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .controls-hint {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            line-height: 1.8;
        }

        .controls-hint span {
            color: #fff;
            font-weight: 600;
        }

        .stats {
            text-align: right;
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--accent);
            opacity: 0.6;
        }

        /* Interaction feedback */
        .cursor-trail {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            mix-blend-mode: screen;
            z-index: 999;
            filter: blur(2px);
        }
    </style>
</head>

<body>

    <div class="ui-overlay">
        <header class="glass-panel">
            <h1>Generative Experience</h1>
            <div class="tagline">NEON FRACTAL<br>NEBULA</div>
        </header>

        <footer>
            <div class="glass-panel controls-hint">
                <span>Move</span> to disturb the flow<br>
                <span>Scroll</span> to warp dimensions<br>
                <span>Click</span> to pulse the core
            </div>
            <div class="stats">
                CORE_STABILITY: 98.4%<br>
                FLUID_DENSITY: 80.0K<br>
                NEURAL_LINK: ACTIVE
            </div>
        </footer>
    </div>

    <!-- Import Map for Post-processing & Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

        // --- Configuration ---
        const CONFIG = {
            bloom: {
                strength: 1.5,
                radius: 0.4,
                threshold: 0.1
            },
            nebula: {
                count: 80000,
                radius: 100,
                color1: 0x4fc3f7,
                color2: 0x6c5ce7
            },
            core: {
                detail: 128,
                radius: 10
            }
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        // --- Post-Processing ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight),
            CONFIG.bloom.strength, CONFIG.bloom.radius, CONFIG.bloom.threshold);

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- Core: Generative Fractal-like Structure ---
        const coreGeometry = new THREE.IcosahedronGeometry(CONFIG.core.radius, 15);
        const coreMaterial = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.1
        });
        const coreMesh = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(coreMesh);

        // Internal Glow Sphere
        const innerGlowGeo = new THREE.SphereGeometry(CONFIG.core.radius * 0.8, 32, 32);
        const innerGlowMat = new THREE.MeshBasicMaterial({ color: CONFIG.nebula.color1 });
        const innerGlow = new THREE.Mesh(innerGlowGeo, innerGlowMat);
        scene.add(innerGlow);

        // --- Nebula: Reactive Particle System ---
        const nebulaGeo = new THREE.BufferGeometry();
        const nebulaPositions = new Float32Array(CONFIG.nebula.count * 3);
        const nebulaColors = new Float32Array(CONFIG.nebula.count * 3);
        const nebulaVelocities = new Float32Array(CONFIG.nebula.count * 3);

        const color1 = new THREE.Color(CONFIG.nebula.color1);
        const color2 = new THREE.Color(CONFIG.nebula.color2);

        for (let i = 0; i < CONFIG.nebula.count; i++) {
            const i3 = i * 3;
            // Spherical distribution
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = Math.pow(Math.random(), 0.5) * CONFIG.nebula.radius;

            nebulaPositions[i3] = r * Math.sin(phi) * Math.cos(theta);
            nebulaPositions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            nebulaPositions[i3 + 2] = r * Math.cos(phi);

            const mixedColor = color1.clone().lerp(color2, Math.random());
            nebulaColors[i3] = mixedColor.r;
            nebulaColors[i3 + 1] = mixedColor.g;
            nebulaColors[i3 + 2] = mixedColor.b;

            nebulaVelocities[i3] = (Math.random() - 0.5) * 0.1;
            nebulaVelocities[i3 + 1] = (Math.random() - 0.5) * 0.1;
            nebulaVelocities[i3 + 2] = (Math.random() - 0.5) * 0.1;
        }

        nebulaGeo.setAttribute('position', new THREE.BufferAttribute(nebulaPositions, 3));
        nebulaGeo.setAttribute('color', new THREE.BufferAttribute(nebulaColors, 3));

        const nebulaMaterial = new THREE.PointsMaterial({
            size: 0.1,
            vertexColors: true,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const nebulaPoints = new THREE.Points(nebulaGeo, nebulaMaterial);
        scene.add(nebulaPoints);

        // --- Mouse Interaction ---
        let mouseX = 0, mouseY = 0;
        let targetMouseX = 0, targetMouseY = 0;
        let clickForce = 0;

        window.addEventListener('mousemove', (e) => {
            targetMouseX = (e.clientX - window.innerWidth / 2) / 100;
            targetMouseY = (e.clientY - window.innerHeight / 2) / 100;
        });

        window.addEventListener('mousedown', () => {
            clickForce = 5;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Smooth mouse
            mouseX += (targetMouseX - mouseX) * 0.05;
            mouseY += (targetMouseY - mouseY) * 0.05;

            // Rotate Core
            coreMesh.rotation.y += 0.005;
            coreMesh.rotation.z += 0.002;

            // Morph Core Vertices (Pseudo-generative)
            const posAttr = coreMesh.geometry.attributes.position;
            for (let i = 0; i < posAttr.count; i++) {
                const vec = new THREE.Vector3().fromBufferAttribute(posAttr, i);
                vec.normalize().multiplyScalar(CONFIG.core.radius +
                    Math.sin(vec.x * 0.5 + time * 2) * 2 +
                    Math.cos(vec.y * 0.5 + time * 1.5) * 2 +
                    clickForce * Math.sin(time * 10)
                );
                posAttr.setXYZ(i, vec.x, vec.y, vec.z);
            }
            posAttr.needsUpdate = true;

            clickForce *= 0.95; // Decay click force

            // Inner Glow pulse
            innerGlow.scale.setScalar(1 + Math.sin(time * 3) * 0.1 + clickForce * 0.1);
            innerGlow.material.color.setHSL(0.5 + Math.sin(time * 0.5) * 0.1, 0.7, 0.5);

            // Update Nebula
            const positions = nebulaPoints.geometry.attributes.position.array;
            for (let i = 0; i < CONFIG.nebula.count; i++) {
                const i3 = i * 3;

                // Spiral movement
                const x = positions[i3];
                const y = positions[i3 + 1];
                const z = positions[i3 + 2];

                positions[i3] += Math.sin(y * 0.05 + time) * 0.02 + mouseX * 0.1;
                positions[i3 + 1] += Math.cos(x * 0.05 + time) * 0.02 - mouseY * 0.1;

                // Drift back if too far
                const dist = Math.sqrt(x * x + y * y + z * z);
                if (dist > CONFIG.nebula.radius * 1.5) {
                    positions[i3] *= 0.99;
                    positions[i3 + 1] *= 0.99;
                    positions[i3 + 2] *= 0.99;
                }
            }
            nebulaPoints.geometry.attributes.position.needsUpdate = true;
            nebulaPoints.rotation.y += 0.001;

            // Camera movement
            camera.position.x += (mouseX * 20 - camera.position.x) * 0.05;
            camera.position.y += (-mouseY * 20 - camera.position.y) * 0.05;
            camera.lookAt(0, 0, 0);

            composer.render();
        }

        animate();
    </script>
</body>

</html>
