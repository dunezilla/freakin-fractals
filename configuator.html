<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Product Configurator</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        .ui-panel {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px;
            color: white; min-width: 250px; font-size: 14px;
        }
        .controls { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        button {
            background: #6c757d; color: white; border: none; padding: 8px 16px;
            border-radius: 5px; cursor: pointer; margin: 2px; font-size: 13px;
        }
        button:hover { background: #5a6268; }
        button.primary { background: #0d6efd; }
        button.primary:hover { background: #0b5ed7; }
        .color-picker input { width: 100%; height: 40px; cursor: pointer; }
        .info { margin-top: 15px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

<div class="ui-panel">
    <h3>🛠️ Product Builder</h3>
    
    <div class="controls">
        <label>⚙️ Base Shape:</label>
        <button onclick="addSphere()">Sphere</button>
        <button onclick="addCylinder()">Cylinder</button>
        <button onclick="addBox()">Cube</button>
        
        <label>🎨 Color:</label>
        <input type="color" id="colorPicker" oninput="changeColor(this.value)" value="#ff6b6b">
        
        <label>✨ Size:</label>
        <input type="range" min="10" max="200" value="80" onchange="setScale(this.value)">
        
        <div class="info">
            Pieces: <span id="pieceCount">3</span><br>
            Price: $<span id="priceEstimate">249.00</span><br>
            Instructions: Click buttons to add parts. Each part increases the price!
        </div>
    </div>
    
    <button class="primary" onclick="exportDesign()">💾 Export Design</button>
</div>

<!-- Three.js loaded directly from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 30;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(scene.background);
document.body.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0x404040);
scene.add(ambientLight);
const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
directionalLight.position.set(5, 10, 7);
scene.add(directionalLight);

// Material and Geometry variables
let geometry;
let material;
let mesh;
let pieces = [];
let totalCost = 249.00;

// Color picker
function changeColor(color) {
    const colorObj = new THREE.Color(color);
    if (material) {
        material.color.set(colorObj);
    } else {
        // Create material if doesn't exist yet
        geometry = new THREE.BoxGeometry();
        material = new THREE.MeshStandardMaterial({ 
            color: colorObj, 
            roughness: 0.5, 
            metalness: 0.1 
        });
        mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
        pieces.push(mesh);
        updatePrice();
    }
}

// Add shape functions
function addSphere() {
    if (!geometry) {
        geometry = new THREE.SphereGeometry(1, 32, 16);
        changeColor('#ff6b6b');
    }
    const newMesh = new THREE.Mesh(geometry.clone(), material.clone());
    newMesh.position.set((Math.random() - 0.5) * 5, (Math.random() - 0.5) * 5, (Math.random() - 0.5) * 5);
    scene.add(newMesh);
    pieces.push(newMesh);
    updatePrice();
}

function addCylinder() {
    if (!geometry) changeColor('#ff6b6b');
    geometry = new THREE.CylinderGeometry(1, 1, 2, 32);
    const newMesh = new THREE.Mesh(geometry.clone(), material.clone());
    newMesh.position.set((Math.random() - 0.5) * 5, (Math.random() - 0.5) * 5, (Math.random() - 0.5) * 5);
    scene.add(newMesh);
    pieces.push(newMesh);
    updatePrice();
}

function addBox() {
    if (!geometry) changeColor('#ff6b6b');
    geometry = new THREE.BoxGeometry(1, 1, 1);
    const newMesh = new THREE.Mesh(geometry.clone(), material.clone());
    newMesh.position.set((Math.random() - 0.5) * 5, (Math.random() - 0.5) * 5, (Math.random() - 0.5) * 5);
    scene.add(newMesh);
    pieces.push(newMesh);
    updatePrice();
}

function setScale(value) {
    if (material && mesh) {
        const factor = parseInt(value) / 100;
        geometry.scale(factor, factor, factor);
        mesh.scale(factor, factor, factor);
    }
}

function updatePrice() {
    totalCost = 249.00 + (pieces.length - 1) * 50; // Each part adds $50
    document.getElementById('priceEstimate').textContent = totalCost.toFixed(2);
    document.getElementById('pieceCount').textContent = pieces.length;
}

function exportDesign() {
    alert("Design Exported! \nPrice: $" + totalCost.toFixed(2) + "\nParts: " + pieces.length);
}

// Auto-create initial sphere on load
document.addEventListener('DOMContentLoaded', () => {
    changeColor('#ff6b6b');
});

// Render loop
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

animate();

// Handle window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
